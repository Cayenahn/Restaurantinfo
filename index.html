<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Gestión — Selección de Usuario</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet"/>
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1E3A8A;
      --primary-light: #60A5FA;
      --accent: #84CC16;
      --accent-soft: #D9F99D;
      --text-dark: #0F172A;
      --text-body: #334155;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --bg-light: #F8FAFC;
      --white: #FFFFFF;
      --shadow-sm: 0 4px 20px rgba(0,0,0,0.05);
      --shadow-md: 0 10px 25px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 50px rgba(37,99,235,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fondo decorativo */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(132,204,22,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 52px;
      position: relative;
      z-index: 1;
      animation: fadeDown 0.6s ease both;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #1E3A8A 0%, #2563EB 60%, #60A5FA 100%);
      color: white;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(37,99,235,0.3);
    }

    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.1;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    h1 span {
      background: linear-gradient(135deg, #2563EB, #60A5FA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
    }

    /* Grid de usuarios */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 900px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Tarjeta de usuario */
    .user-card {
      background: var(--white);
      border-radius: 20px;
      padding: 28px 20px 22px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      animation: fadeUp 0.5s ease both;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      overflow: hidden;
    }

    .user-card:nth-child(1) { animation-delay: 0.05s; }
    .user-card:nth-child(2) { animation-delay: 0.10s; }
    .user-card:nth-child(3) { animation-delay: 0.15s; }
    .user-card:nth-child(4) { animation-delay: 0.20s; }
    .user-card:nth-child(5) { animation-delay: 0.25s; }
    .user-card:nth-child(6) { animation-delay: 0.30s; }

    .user-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s ease;
      border-radius: 20px 20px 0 0;
    }

    .user-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(37,99,235,0.2);
    }

    .user-card:hover::before {
      opacity: 1;
    }

    /* Roles especiales */
    .user-card[data-role="gerencia"] .avatar-wrap {
      background: linear-gradient(135deg, #1E3A8A, #2563EB);
    }
    .user-card[data-role="colaborador"] .avatar-wrap {
      background: linear-gradient(135deg, #2563EB, #60A5FA);
    }

    /* Avatar */
    .avatar-wrap {
      width: 68px; height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .avatar-initials {
      font-size: 22px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.02em;
      user-select: none;
    }

    /* Nombre editable */
    .user-name-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
    }

    .user-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
      border: none;
      background: transparent;
      text-align: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      width: 100%;
      cursor: pointer;
      border-radius: 6px;
      padding: 2px 6px;
      transition: background 0.15s;
    }

    .user-name:focus {
      background: var(--bg-light);
      cursor: text;
    }

    .edit-icon {
      color: var(--text-muted);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      cursor: pointer;
      flex-shrink: 0;
    }

    .user-card:hover .edit-icon {
      opacity: 1;
    }

    /* Badge de rol */
    .role-badge {
      background: #EFF6FF;
      color: var(--primary);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .user-card[data-role="gerencia"] .role-badge {
      background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
      color: var(--primary-dark);
    }

    /* Botón entrar */
    .btn-enter {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 4px;
    }

    .btn-enter:hover {
      background: var(--primary-dark);
      transform: scale(1.02);
    }

    .btn-enter:active {
      transform: scale(0.98);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease 0.4s both;
    }

    .footer strong { color: var(--primary); }

    /* Hint edición */
    .edit-hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
      animation: fadeDown 0.6s ease 0.1s both;
    }

    .edit-hint i { color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-dark);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Animaciones */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .users-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo-badge">
      <span class="logo-dot"></span>
      Sistema de Gestión
    </div>
    <h1>¿Quién está <span>trabajando hoy?</span></h1>
    <p class="subtitle">Selecciona tu perfil para acceder al panel</p>
  </div>

  <!-- Hint edición -->
  <div class="edit-hint">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#84CC16" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Haz clic en el nombre para editarlo
  </div>

  <!-- Grid de usuarios -->
  <div class="users-grid" id="usersGrid"></div>

  <!-- Footer -->
  <div class="footer">
    <p>v1.0 &nbsp;·&nbsp; <strong>Sin restricciones activas</strong> &nbsp;·&nbsp; Próximamente: acceso por contraseña</p>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ─── Datos iniciales de usuarios ───────────────────────────────────
    const defaultUsers = [
      { id: 1, name: "Gerencia",      role: "gerencia",     initials: "G1" },
      { id: 2, name: "Gerencia 2",    role: "gerencia",     initials: "G2" },
      { id: 3, name: "Colaborador 1", role: "colaborador",  initials: "C1" },
      { id: 4, name: "Colaborador 2", role: "colaborador",  initials: "C2" },
      { id: 5, name: "Colaborador 3", role: "colaborador",  initials: "C3" },
      { id: 6, name: "Colaborador 4", role: "colaborador",  initials: "C4" },
    ];

    // Persistencia en localStorage
    function loadUsers() {
      try {
        const saved = localStorage.getItem('sg_users');
        return saved ? JSON.parse(saved) : defaultUsers;
      } catch { return defaultUsers; }
    }

    function saveUsers(users) {
      localStorage.setItem('sg_users', JSON.stringify(users));
    }

    function getInitials(name) {
      const words = name.trim().split(/\s+/);
      if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    // ─── Renderizado ───────────────────────────────────────────────────
    let users = loadUsers();

    function render() {
      const grid = document.getElementById('usersGrid');
      grid.innerHTML = '';

      users.forEach((user, idx) => {
        const card = document.createElement('div');
        card.className = 'user-card';
        card.dataset.role = user.role;
        card.innerHTML = `
          <div class="avatar-wrap">
            <span class="avatar-initials" id="initials-${user.id}">${getInitials(user.name)}</span>
          </div>
          <div class="user-name-wrap">
            <input
              class="user-name"
              id="name-${user.id}"
              value="${user.name}"
              maxlength="24"
              title="Haz clic para editar el nombre"
              autocomplete="off"
              spellcheck="false"
            />
            <svg class="edit-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" onclick="focusName(${user.id})">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
          <span class="role-badge">${user.role === 'gerencia' ? '⭐ Gerencia' : '👤 Colaborador'}</span>
          <button class="btn-enter" onclick="enterUser(${user.id}, event)">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Ingresar
          </button>
        `;

        // Evento: editar nombre
        const input = card.querySelector(`#name-${user.id}`);
        input.addEventListener('blur', () => saveName(user.id, input.value));
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') input.blur();
          e.stopPropagation();
        });
        input.addEventListener('input', () => {
          const init = document.getElementById(`initials-${user.id}`);
          if (init) init.textContent = getInitials(input.value || '??');
        });

        // Evitar que click en input abra la card
        input.addEventListener('click', e => e.stopPropagation());

        grid.appendChild(card);
      });
    }

    function focusName(id) {
      const input = document.getElementById(`name-${id}`);
      if (input) { input.focus(); input.select(); }
    }

    function saveName(id, newName) {
      const trimmed = newName.trim() || defaultUsers.find(u => u.id === id).name;
      const user = users.find(u => u.id === id);
      if (user) {
        user.name = trimmed;
        const input = document.getElementById(`name-${id}`);
        if (input) input.value = trimmed;
        const init = document.getElementById(`initials-${id}`);
        if (init) init.textContent = getInitials(trimmed);
        saveUsers(users);
        showToast(`✅ Nombre guardado: ${trimmed}`);
      }
    }

    // ─── Ingreso de usuario ────────────────────────────────────────────
    function enterUser(id, event) {
      event.stopPropagation();
      const user = users.find(u => u.id === id);
      if (!user) return;

      sessionStorage.setItem('sg_active_user', JSON.stringify(user));
      showToast(`👋 Bienvenido/a, ${user.name}`);

      setTimeout(() => {
        window.location.href = 'pl-restaurante.html';
      }, 600);
    }

    // ─── Toast ─────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ─── Init ──────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
