<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RestoPro — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary:       #2563EB;
      --primary-dark:  #1E3A8A;
      --primary-light: #60A5FA;
      --accent:        #84CC16;
      --text-dark:     #0F172A;
      --text-body:     #334155;
      --text-muted:    #64748B;
      --border:        #E2E8F0;
      --bg-light:      #F8FAFC;
      --white:         #FFFFFF;
      --red:           #DC2626;
      --red-soft:      #FEF2F2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(132,204,22,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.07);
      position: relative;
      z-index: 1;
      animation: fadeUp .4s ease both;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #1E3A8A, #2563EB);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .logo-text { font-size: 18px; font-weight: 800; color: var(--text-dark); letter-spacing: -.02em; }
    .logo-text small { display: block; font-size: 11px; font-weight: 400; color: var(--text-muted); }

    h1 { font-size: 22px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; letter-spacing: -.02em; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
    .field input {
      width: 100%; height: 44px;
      padding: 0 14px;
      border: 1.5px solid var(--border);
      border-radius: 11px;
      font-family: inherit; font-size: 14px; color: var(--text-dark);
      background: var(--bg-light);
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .field input:focus { border-color: var(--primary); background: #fff; }
    .field input.error { border-color: var(--red); background: var(--red-soft); }

    .btn-login {
      width: 100%; height: 46px;
      background: var(--primary);
      color: #fff;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s, transform .15s;
    }
    .btn-login:hover { background: var(--primary-dark); transform: scale(1.01); }
    .btn-login:disabled { background: #93C5FD; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 12.5px; font-weight: 600;
      margin-bottom: 18px;
      display: none;
    }
    .alert.show { display: block; }
    .alert.err { background: var(--red-soft); color: var(--red); border: 1px solid #FCA5A5; }

    .card-footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11.5px; color: var(--text-muted);
    }
    .card-footer strong { color: var(--primary); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">R</div>
    <div class="logo-text">RestoPro <small>Sistema de Gestión</small></div>
  </div>

  <h1>Bienvenido</h1>
  <p class="subtitle">Ingresa tus credenciales para continuar</p>

  <div class="alert err" id="alertErr"></div>

  <div class="field">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="username"/>
  </div>

  <div class="field">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn-login" id="btnLogin">
    <span class="spinner"></span>
    <span class="btn-text">Iniciar Sesión</span>
  </button>

  <div class="card-footer">
    v2.0 &nbsp;·&nbsp; <strong>RestoPro</strong> &nbsp;·&nbsp; Powered by Firebase
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, enableNetwork }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyD7EOVsm2lMcPJzND9IOJvIv7jptsU5x4g",
    authDomain:        "restaurant-admin-461d2.firebaseapp.com",
    projectId:         "restaurant-admin-461d2",
    storageBucket:     "restaurant-admin-461d2.firebasestorage.app",
    messagingSenderId: "81596243648",
    appId:             "1:81596243648:web:f676437ad1f807dd5b1725",
    measurementId:     "G-B9HC254PRL"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Forzar conexión online
  enableNetwork(db);

  // Si ya hay sesión activa, redirigir
  onAuthStateChanged(auth, async (user) => {
    if (user) await redirectByRole(user.uid);
  });

  const btn      = document.getElementById('btnLogin');
  const emailEl  = document.getElementById('email');
  const passEl   = document.getElementById('password');
  const alertErr = document.getElementById('alertErr');

  btn.addEventListener('click', login);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const email    = emailEl.value.trim();
    const password = passEl.value;

    alertErr.classList.remove('show');
    emailEl.classList.remove('error');
    passEl.classList.remove('error');

    if (!email || !password) {
      showError('Completa todos los campos.');
      if (!email)    emailEl.classList.add('error');
      if (!password) passEl.classList.add('error');
      return;
    }

    setLoading(true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      await redirectByRole(cred.user.uid);
    } catch (err) {
      setLoading(false);
      showError(friendlyError(err.code));
    }
  }

  async function redirectByRole(uid) {
    try {
      // Pequeña espera para que Firestore establezca conexión
      await new Promise(r => setTimeout(r, 600));

      const snap = await getDoc(doc(db, 'usuarios', uid));

      if (snap.exists()) {
        const data = snap.data();
        sessionStorage.setItem('sg_active_user', JSON.stringify({
          uid:   uid,
          name:  data.nombre || 'Usuario',
          role:  data.rol    || 'colaborador',
          cargo: data.cargo  || '',
        }));
        if (data.rol === 'gerencia') {
          window.location.href = 'pl-restaurante.html';
        } else {
          window.location.href = 'su-espacio.html';
        }
      } else {
        showError('Tu cuenta no tiene perfil configurado. Contacta a Gerencia.');
        setLoading(false);
        await signOut(auth);
      }
    } catch (err) {
      showError('Error: ' + err.message + ' | ' + err.code);
      setLoading(false);
    }
  }

  function setLoading(on) {
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  function showError(msg) {
    alertErr.textContent = msg;
    alertErr.classList.add('show');
  }

  function friendlyError(code) {
    const map = {
      'auth/user-not-found':         'No existe una cuenta con ese correo.',
      'auth/wrong-password':         'Contraseña incorrecta.',
      'auth/invalid-email':          'El correo no tiene un formato válido.',
      'auth/too-many-requests':      'Demasiados intentos. Espera unos minutos.',
      'auth/invalid-credential':     'Correo o contraseña incorrectos.',
      'auth/network-request-failed': 'Sin conexión a internet.',
    };
    return map[code] || 'Error al iniciar sesión (' + code + ')';
  }
</script>
</body>
</html>
